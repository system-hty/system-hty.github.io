<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM-HTY - GitHub登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #c9d1d9;
        }
        
        .login-container {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .github-logo {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .github-logo i {
            font-size: 64px;
            color: #f0f6fc;
            position: relative;
            z-index: 2;
        }
        
        .logo-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(110, 84, 148, 0.3);
            border-radius: 50%;
            z-index: 1;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }
            70% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #f0f6fc;
        }
        
        .login-header p {
            color: #8b949e;
            font-size: 16px;
        }
        
        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: #2ea44f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
            z-index: -1;
        }
        
        .login-btn:hover {
            background: #3cb055;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 164, 79, 0.3);
        }
        
        .login-btn:hover::before {
            transform: translateX(100%);
        }
        
        .login-btn i {
            font-size: 20px;
            margin-right: 10px;
        }
        
        .error-message {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
            color: #f85149;
            display: none;
        }
        
        .error-message h3 {
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }
        
        .error-message h3 i {
            margin-right: 8px;
        }
        
        .success-message {
            background: rgba(46, 164, 79, 0.15);
            border: 1px solid rgba(46, 164, 79, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
            color: #2ea44f;
            display: none;
        }
        
        .config-info {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #8b949e;
        }
        
        .config-info h3 {
            color: #c9d1d9;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .config-info ul {
            padding-left: 20px;
        }
        
        .config-info li {
            margin-bottom: 5px;
        }
        
        .config-info code {
            background: rgba(13, 17, 23, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #8b949e;
            font-size: 12px;
        }
        
        .login-footer a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(240, 246, 252, 0.1);
            border-top: 4px solid #2ea44f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .github-logo i {
                font-size: 48px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="github-logo">
            <i class="fab fa-github"></i>
            <div class="logo-pulse"></div>
        </div>
        
        <div class="login-header">
            <h1>登录SYSTEM-HTY</h1>
            <p>使用GitHub账号安全登录</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            <h3><i class="fas fa-exclamation-triangle"></i> 安全警告</h3>
            <p>请确保您信任此应用程序并已验证重定向URI的安全性。</p>
        </div>
        
        <div class="success-message" id="successMessage"></div>
        
        <button class="login-btn" id="githubLoginBtn">
            <i class="fab fa-github"></i> 使用GitHub登录
        </button>
        
        <div class="config-info">
            <h3><i class="fas fa-cog"></i> GitHub OAuth配置</h3>
            <p>解决redirect_uri问题：</p>
            <ul>
                <li>客户端 ID: <code>Ov23liv4elLYx7XVnIQ3</code></li>
                <li>回调URL: <code id="callbackUrlDisplay">https://system-hty.github.io/login.html</code></li>
                <li>请确保在GitHub OAuth应用中设置相同的回调URL</li>
            </ul>
        </div>
        
        <div class="login-footer">
            <p>SYSTEM-HTY开发者社区 &copy; 2023</p>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            try {
                // 显示当前URL作为回调URL
                const currentUrl = window.location.origin + window.location.pathname;
                document.getElementById('callbackUrlDisplay').textContent = currentUrl;
                
                // 检查URL参数
                checkUrlParams();
                
                // 初始化登录功能
                initLogin();
            } catch (error) {
                console.error('初始化出错:', error);
                showError('初始化失败: ' + error.message);
            }
        });

        // 初始化登录功能
        function initLogin() {
            const githubLoginBtn = document.getElementById('githubLoginBtn');
            
            // GitHub登录按钮点击事件
            if (githubLoginBtn) {
                githubLoginBtn.addEventListener('click', function() {
                    startGitHubOAuth();
                });
            }
        }
        
        // 检查URL参数
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 检查错误参数
            const error = urlParams.get('error');
            if (error) {
                showError('GitHub登录失败: ' + error);
                
                // 如果是redirect_uri不匹配错误，提供详细解决方案
                if (error.includes('redirect_uri')) {
                    showError('redirect_uri不匹配。请确保GitHub OAuth应用中的回调URL设置为: ' + window.location.origin + window.location.pathname);
                }
            }
            
            // 检查授权码
            const code = urlParams.get('code');
            if (code) {
                handleGitHubCallback(code);
            }
        }
        
        // 显示错误消息
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            if (errorElement) {
                errorElement.innerHTML = `<h3><i class="fas fa-exclamation-triangle"></i> ${message}</h3>`;
                errorElement.style.display = 'block';
            }
        }
        
        // 显示成功消息
        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            if (successElement) {
                successElement.textContent = message;
                successElement.style.display = 'block';
                
                // 5秒后自动隐藏
                setTimeout(() => {
                    successElement.style.display = 'none';
                }, 5000);
            }
        }
        
        // 显示加载动画
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }
        
        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }
        
        // 实际的GitHub OAuth登录函数
        function startGitHubOAuth() {
            // GitHub OAuth配置
            const clientId = 'Ov23liv4elLYx7XVnIQ3';
            // 使用当前页面作为重定向URI
            const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
            const scope = encodeURIComponent('read:user user:email');
            
            // 构建GitHub OAuth URL
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&scope=${scope}`;
            
            // 重定向到GitHub授权页面
            window.location.href = authUrl;
        }
        
        // 处理GitHub OAuth回调
        function handleGitHubCallback(code) {
            // 显示加载状态
            showLoading();
            
            // 模拟API调用
            setTimeout(() => {
                hideLoading();
                
                // 模拟成功登录
                showSuccess('登录成功！您已通过GitHub身份验证');
                
                // 在实际应用中，这里会处理授权码并获取访问令牌
                // 然后重定向到应用主页
            }, 2000);
        }
    </script>
</body>
</html>
